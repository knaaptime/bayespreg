name: test
channels:
  - conda-forge
dependencies:
  - python=3.14
  - libpysal
  - arviz < 1
  - formulaic
  - pymc
  - spreg
  - statsmodels
  - geopandas
  - geodatasets
  - codecov
  - coverage
  - pytest
  - pytest-cov
  - pytest-mpl
  - pytest-xdist
  - openpyxl
  - lazy_loader

  # docs
  - twine
  - sphinx>=1.4.3
  - sphinxcontrib-bibtex
  - sphinx_bootstrap_theme
  - linkify-it-py
  - numpydoc
  - nbsphinx
  - pip
  - pip:
      # dev versions of packages
      - --pre \
        --index-url https://pypi.anaconda.org/scientific-python-nightly-wheels/simple \
        --extra-index-url https://pypi.org/simple
      - scipy
      - shapely
      - git+https://github.com/geopandas/geopandas.git@main
